{% extends 'base.html' %}
{% block content%}
    <h1>Rooms</h1>
    <ul>
        {%for room in rooms%}
            <img src="{{ room.image.url }}">
            <h2>{{ room.number}} - {{ room.category.title}}</h2>
            <p>Місць: {{room.capacity}}</p>
            <p>${{room.price}}</p>
            <a href = "#">Забронювати</a>
        {%endfor%}
    </ul>
{%endblock%}
